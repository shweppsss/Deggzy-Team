name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Standard Pages permissions per the official deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel any in-progress run that's
# been superseded by a newer push (we want the latest to land).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No cache for now — package-lock.json doesn't exist yet at
          # TS-0. Add `cache: 'npm'` once the lockfile is committed.

      - name: Install dependencies
        run: npm install

      - name: Run TypeScript check + Vite build
        run: npm run build

      - name: Run runtime coexistence harness (regression gate)
        run: npm run verify

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
